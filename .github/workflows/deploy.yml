name: Deploy MkDocs
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install mkdocs mkdocs-material
      - run: mkdocs gh-deploy --force
        env:
          GITHUB_TOKEN: ${{ secrets.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 }}